spring:
  # Redis configuration (host/port auto-configured by @ServiceConnection)
  data:
    redis:
      timeout: 10000ms

  # OAuth2 Client (issuer-uri will be overridden by @DynamicPropertySource)
  security:
    oauth2:
      client:
        registration:
          idp:
            client-id: test-client-id
            client-secret: test-client-secret
            scope:
              - openid
              - profile
              - email
              - offline_access
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
        provider:
          idp:
            # Will be overridden to point to WireMock
            issuer-uri: http://localhost:8080/idp

session:
  key-prefix: "session:test:"
  ttl-seconds: 900
  refresh-threshold-seconds: 300
  oauth2-state-ttl-seconds: 900
  cookie:
    domain-override:
    name: BA_SESSION
    secure: true
    same-site: Strict

idp:
  audience: https://api.budgetanalyzer.test
  http-client:
    pool-name: idp-oidc-callback
    max-connections: 50
    pending-acquire-max-count: 100
    pending-acquire-timeout: 5s
    max-idle-time: 30s
    max-life-time: 5m
    eviction-interval: 30s
    connect-timeout: 5s
    response-timeout: 10s
    read-timeout: 10s
    write-timeout: 10s

# Logging
logging:
  level:
    org.springframework.security: INFO
    org.springframework.security.oauth2: INFO
    org.budgetanalyzer.sessiongateway: DEBUG

# Permission service (overridden by @DynamicPropertySource in tests)
permission-service:
  base-url: http://localhost:8080
