spring:
  # Redis configuration (host/port auto-configured by @ServiceConnection)
  data:
    redis:
      timeout: 2000ms

  # Session configuration
  session:
    timeout: 30m
    redis:
      namespace: spring:session:test

  # OAuth2 Client (issuer-uri will be overridden by @DynamicPropertySource)
  security:
    oauth2:
      client:
        registration:
          idp:
            client-id: test-client-id
            client-secret: test-client-secret
            scope:
              - openid
              - profile
              - email
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
        provider:
          idp:
            # Will be overridden to point to WireMock
            issuer-uri: http://localhost:8080/idp

  # Cloud Gateway routes
  cloud:
    gateway:
      routes:
        - id: api-route
          uri: ${api.gateway.url:http://localhost:8080}
          predicates:
            - Path=/api/**
          filters:
            - TokenRelay=
        - id: frontend-route
          uri: ${api.gateway.url:http://localhost:8080}
          predicates:
            - Path=/**
          filters:
            - TokenRelay=

# Logging
logging:
  level:
    org.springframework.security: DEBUG
    org.springframework.security.oauth2: DEBUG
    org.budgetanalyzer.sessiongateway: DEBUG

# Custom properties
api:
  gateway:
    url: http://localhost:8080

# Permission service (overridden by @DynamicPropertySource in tests)
permission-service:
  base-url: http://localhost:8080

# ext_authz session configuration for tests
extauthz:
  session:
    key-prefix: "extauthz:session:test:"
    ttl-seconds: 1800
