server:
  port: 8081
  # Listen on all interfaces so NGINX container can reach us via host.docker.internal
  address: 0.0.0.0
  # Enable forward headers strategy for WebFlux
  # This ensures Spring Security correctly constructs redirect URIs when behind NGINX proxy
  # Without this, the redirect_uri sent to the IDP may be incorrect
  forward-headers-strategy: framework
  # Note: SSL is handled by NGINX - Session Gateway runs on HTTP internally
  error:
    whitelabel:
      enabled: false

logging:
  level:
    root: WARN
    org.budgetanalyzer: TRACE
    org.springframework.security: INFO
    org.springframework.security.oauth2: INFO
    org.springframework.web.reactive.function.client: INFO

spring:
  application:
    name: session-gateway

  ssl:
    bundle:
      pem:
        infra-ca:
          truststore:
            certificate: ${INFRA_CA_CERT_PATH:}

  # Redis configuration for session storage
  data:
    redis:
      host: localhost  # Use 'redis' when running in Docker
      port: 6379
      username: ${SPRING_DATA_REDIS_USERNAME:session-gateway}
      password: ${SPRING_DATA_REDIS_PASSWORD:}
      timeout: 2000ms
      ssl:
        enabled: ${SPRING_DATA_REDIS_SSL_ENABLED:false}
        bundle: ${SPRING_DATA_REDIS_SSL_BUNDLE:}

  # OAuth2 Client configuration
  security:
    oauth2:
      client:
        registration:
          idp:
            client-id: ${AUTH0_CLIENT_ID:placeholder-client-id}
            client-secret: ${AUTH0_CLIENT_SECRET:placeholder-client-secret}
            scope:
              - openid
              - profile
              - email
              - offline_access
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            client-authentication-method: client_secret_basic
        provider:
          idp:
            issuer-uri: ${AUTH0_ISSUER_URI:https://placeholder.auth0.com/}

# Session configuration
session:
  key-prefix: ${SESSION_KEY_PREFIX:session:}
  ttl-seconds: ${SESSION_TTL_SECONDS:900}
  refresh-threshold-seconds: ${SESSION_REFRESH_THRESHOLD_SECONDS:300}
  oauth2-state-ttl-seconds: ${SESSION_OAUTH2_STATE_TTL_SECONDS:900}
  cookie:
    domain-override: ${SESSION_COOKIE_DOMAIN_OVERRIDE:}
    name: ${SESSION_COOKIE_NAME:BA_SESSION}
    secure: ${SESSION_COOKIE_SECURE:true}
    same-site: ${SESSION_COOKIE_SAME_SITE:Strict}

# IDP configuration
idp:
  audience: ${IDP_AUDIENCE:https://api.budgetanalyzer.org}
  http-client:
    pool-name: ${IDP_HTTP_CLIENT_POOL_NAME:idp-oidc-callback}
    max-connections: ${IDP_HTTP_CLIENT_MAX_CONNECTIONS:50}
    pending-acquire-max-count: ${IDP_HTTP_CLIENT_PENDING_ACQUIRE_MAX_COUNT:100}
    pending-acquire-timeout: ${IDP_HTTP_CLIENT_PENDING_ACQUIRE_TIMEOUT:5s}
    max-idle-time: ${IDP_HTTP_CLIENT_MAX_IDLE_TIME:30s}
    max-life-time: ${IDP_HTTP_CLIENT_MAX_LIFE_TIME:5m}
    eviction-interval: ${IDP_HTTP_CLIENT_EVICTION_INTERVAL:30s}
    connect-timeout: ${IDP_HTTP_CLIENT_CONNECT_TIMEOUT:5s}
    response-timeout: ${IDP_HTTP_CLIENT_RESPONSE_TIMEOUT:10s}
    read-timeout: ${IDP_HTTP_CLIENT_READ_TIMEOUT:10s}
    write-timeout: ${IDP_HTTP_CLIENT_WRITE_TIMEOUT:10s}
  logout:
    return-to: ${IDP_LOGOUT_RETURN_TO:https://app.budgetanalyzer.localhost/peace}  # Where to redirect after logout (Session Gateway)
    url-template: ${IDP_LOGOUT_URL_TEMPLATE:${spring.security.oauth2.client.provider.idp.issuer-uri}/v2/logout?returnTo={returnTo}&client_id={clientId}}

# Springdoc / Swagger UI
# Disable in production profiles to avoid exposing the API schema publicly.
# Override with springdoc.api-docs.enabled=true in dev/staging profiles.
springdoc:
  api-docs:
    enabled: ${SPRINGDOC_ENABLED:false}
  swagger-ui:
    enabled: ${SPRINGDOC_ENABLED:false}

# Budget Analyzer Common Configuration
budgetanalyzer:
  service:
    http-logging:
      enabled: true
      log-level: DEBUG
      include-request-body: true
      include-response-body: true
      include-request-headers: true
      include-response-headers: true
      include-query-params: true
      include-client-ip: true
      max-body-size: 10000  # 10KB max body size to log
      exclude-patterns:
        - /actuator/**
        - /login/oauth2/code/**
      # Sensitive headers are automatically masked (Authorization, Cookie, Set-Cookie, etc.)
      log-errors-only: false

# Permission service configuration
permission-service:
  base-url: ${PERMISSION_SERVICE_URL:http://permission-service:8086}

# Actuator configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
